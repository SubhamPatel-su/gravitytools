    <style>
        /* CSS Variables & Design Tokens */
        :root {
            --bg-primary: #0B0C10;
            --bg-card: #131520;
            --border-color: #222538;
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --neon-purple: #7C3AED;
            --neon-purple-glow: rgba(124, 58, 237, 0.4);
            --cyan: #06B6D4;
            --cyan-glow: rgba(6, 182, 212, 0.4);
            --emerald: #10B981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --max-width: 1280px;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-bounce: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Base & Reset Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-family);
            font-size: 15px;
            /* baseline slightly smaller for mobile reading */
            line-height: 1.6;
            overflow-x: hidden;
        }

        body {
            position: relative;
            overflow-x: hidden;
            background-color: var(--bg-primary);
        }

        /* Accessibility: Highlight focus states visually */
        *:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 4px;
        }

        /* Fluid Typography and Spacing Container - Optimized for Mobile Padding */
        .container {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 16px;
        }

        /* Ambient Floating Gradient Blobs - Softened on Mobile */
        .ambient-blobs {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            max-height: 1200px;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            animation: floatBlob 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 280px;
            height: 280px;
            background: var(--neon-purple);
            top: -50px;
            left: 5%;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--cyan);
            top: 250px;
            right: -10%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 250px;
            height: 250px;
            background: var(--emerald);
            top: 600px;
            left: -10%;
            animation-delay: -10s;
        }

        @keyframes floatBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -20px) scale(1.1);
            }

            100% {
                transform: translate(-20px, 30px) scale(0.95);
            }
        }

        /* Header & Navigation - Mobile First Default */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(34, 37, 56, 0.4);
            transition: var(--transition-smooth);
            background: rgba(11, 12, 16, 0.8);
        }

        .header--scrolled {
            padding: 8px 0;
            background: rgba(11, 12, 16, 0.95);
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
            transition: var(--transition-smooth);
        }

        .header--scrolled .nav-wrapper {
            height: 56px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-symbol {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--neon-purple), var(--cyan));
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 1rem;
            color: var(--bg-primary);
            box-shadow: 0 0 10px var(--neon-purple-glow);
        }

        .logo-text {
            display: inline-block;
        }

        /* Buttons & CTA styles - Minimum Touch Target 44px */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--font-family);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 12px 20px;
            min-height: 44px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            border: none;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-purple), #9055f2);
            color: #FFFFFF;
            box-shadow: 0 4px 15px var(--neon-purple-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--neon-purple-glow), 0 0 12px rgba(124, 58, 237, 0.5);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(34, 37, 56, 0.6);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(34, 37, 56, 0.9);
            border-color: var(--cyan);
            color: #FFFFFF;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.15);
        }

        /* Hero Section - Mobile First (Stacked layout) */
        .hero {
            padding: 110px 0 48px 0;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
            text-align: center;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: #C084FC;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: var(--emerald);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--emerald);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }
        }

        .hero-title {
            font-size: 2.1rem;
            line-height: 1.25;
            font-weight: 800;
            letter-spacing: -1px;
            color: #FFFFFF;
        }

        .hero-title span {
            background: linear-gradient(135deg, #A855F7 10%, #06B6D4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.5;
            max-width: 580px;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .hero-actions .btn {
            width: 100%;
        }

        .hero-illustration {
            width: 100%;
            max-width: 500px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glassmorphic Mockup Container */
        .glass-mockup {
            background: rgba(19, 21, 32, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .glass-mockup:hover {
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 25px 50px rgba(124, 58, 237, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .mockup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
        }

        .mockup-dots {
            display: flex;
            gap: 6px;
        }

        .mockup-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .mockup-dot:nth-child(1) {
            background-color: #EF4444;
        }

        .mockup-dot:nth-child(2) {
            background-color: #F59E0B;
        }

        .mockup-dot:nth-child(3) {
            background-color: #10B981;
        }

        .mockup-url {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            padding: 2px 12px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.04);
            width: 65%;
            text-align: center;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Mockup Code Preview Elements */
        .mockup-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mockup-preview-box {
            background: linear-gradient(145deg, rgba(20, 20, 25, 0.8), rgba(10, 10, 15, 0.9));
            border-radius: 12px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mockup-tool-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--neon-purple);
        }

        .mockup-tool-icon {
            width: 32px;
            height: 32px;
            background: rgba(124, 58, 237, 0.2);
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: #C084FC;
            font-size: 1rem;
        }

        .mockup-tool-info {
            flex-grow: 1;
            min-width: 0;
        }

        .mockup-tool-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #FFF;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mockup-tool-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mockup-badge {
            background: var(--emerald-glow);
            color: #34D399;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Trust Bar - Mobile Optimized Stack */
        .trust-bar {
            background: rgba(19, 21, 32, 0.6);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 24px 0;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        .trust-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            text-align: center;
        }

        .trust-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .trust-gateways {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
        }

        .gateway-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .trust-benefits {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #FFFFFF;
        }

        .benefit-item svg {
            color: var(--emerald);
            width: 16px;
            height: 16px;
        }

        /* General Section Structure */
        .section {
            padding: 48px 0;
            position: relative;
        }

        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 36px auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #FFFFFF;
            line-height: 1.3;
        }

        .section-title span {
            background: linear-gradient(135deg, var(--neon-purple), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Carousel Component - Mobile Swipe Native feel */
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            touch-action: pan-y;
            /* allows native page scrolling vertically, blocks horizontal */
        }

        .carousel-track-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16/10;
            background: #000;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            opacity: 0;
        }

        .carousel-slide img.loaded {
            opacity: 1;
        }

        /* Fullscreen View Link Overlay - Dynamic positioning */
        .carousel-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            z-index: 10;
        }

        .carousel-overlay .btn {
            min-height: 38px;
            padding: 8px 14px;
            font-size: 0.8rem;
        }

        /* Carousel Navigation Buttons - Hidden on smallest phones to favor swipes, visible on media */
        .carousel-btn {
            display: none;
            /* hidden on small mobile */
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(19, 21, 32, 0.85);
            border: 1px solid var(--border-color);
            color: #FFFFFF;
            place-items: center;
            cursor: pointer;
            z-index: 15;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }

        .carousel-btn:hover {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple-glow);
        }

        .carousel-btn--prev {
            left: 12px;
        }

        .carousel-btn--next {
            right: 12px;
        }

        .carousel-pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px 0;
            background: rgba(19, 21, 32, 0.9);
            border-top: 1px solid var(--border-color);
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-color);
            cursor: pointer;
            border: none;
            transition: var(--transition-smooth);
        }

        .carousel-dot--active {
            background: var(--neon-purple);
            width: 22px;
            border-radius: 4px;
            box-shadow: 0 0 8px var(--neon-purple-glow);
        }

        /* Lightbox Fullscreen Modal */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 12, 16, 0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(15px);
            padding: 16px;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 100%;
            max-height: 80%;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: -44px;
            right: 0;
            background: none;
            border: none;
            color: #FFF;
            font-size: 2.2rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            transition: var(--transition-smooth);
        }

        .lightbox-close:hover {
            color: var(--neon-purple);
        }

        /* Feature Grid Section - Mobile single-column baseline */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 12px;
