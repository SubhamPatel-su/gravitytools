    <script>
        document.addEventListener('DOMContentLoaded', () => {

            /* 1. Header Sticky Transitions */
            const mainHeader = document.getElementById('mainHeader');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 40) {
                    mainHeader.classList.add('header--scrolled');
                } else {
                    mainHeader.classList.remove('header--scrolled');
                }
            }, { passive: true });

            /* 2. Scroll-spy Reveal Animations (Intersection Observer) */
            const revealElements = document.querySelectorAll('.reveal-element');
            const revealOptions = {
                threshold: 0.05,
                rootMargin: '0px 0px -30px 0px'
            };

            const revealObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, revealOptions);

            revealElements.forEach(element => {
                revealObserver.observe(element);
            });

            /* 3. Touch Gestures & Navigation Carousel Setup */
            const track = document.getElementById('carouselTrack');
            const slides = Array.from(track.children);
            const prevBtn = document.getElementById('carouselPrev');
            const nextBtn = document.getElementById('carouselNext');
            const paginationContainer = document.getElementById('carouselPagination');

            let currentIndex = 0;
            let autoSlideInterval;
            let startX = 0;
            let currentX = 0;
            let isDragging = false;

            // Generate pagination dots
            slides.forEach((_, idx) => {
                const dot = document.createElement('button');
                dot.classList.add('carousel-dot');
                if (idx === 0) dot.classList.add('carousel-dot--active');
                dot.setAttribute('aria-label', `Go to slide ${idx + 1}`);
                dot.addEventListener('click', () => {
                    goToSlide(idx);
                    resetAutoSlide();
                });
                paginationContainer.appendChild(dot);
            });

            const dots = Array.from(paginationContainer.children);

            // Lazy load images on demand or active slide proximity
            function lazyLoadImage(slideIndex) {
                const slide = slides[slideIndex];
                if (!slide) return;
                const img = slide.querySelector('.lazy-image');
                if (img && !img.src) {
                    img.src = img.getAttribute('data-src');
                    img.onload = () => img.classList.add('loaded');
                }
            }

            // Lazy load the first two slides immediately
            lazyLoadImage(0);
            lazyLoadImage(1);

            function updateCarouselPosition() {
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                dots.forEach((dot, index) => {
                    dot.classList.toggle('carousel-dot--active', index === currentIndex);
                });
                // Ensure upcoming slide is lazy-loaded
                lazyLoadImage(currentIndex);
                if (currentIndex + 1 < slides.length) lazyLoadImage(currentIndex + 1);
            }

            function goToSlide(index) {
                currentIndex = (index + slides.length) % slides.length;
                updateCarouselPosition();
            }

            function showNextSlide() {
                goToSlide(currentIndex + 1);
            }

            function showPrevSlide() {
                goToSlide(currentIndex - 1);
            }

            nextBtn.addEventListener('click', () => {
                showNextSlide();
                resetAutoSlide();
            });

            prevBtn.addEventListener('click', () => {
                showPrevSlide();
                resetAutoSlide();
            });

            // Auto-slide operations
            function startAutoSlide() {
                autoSlideInterval = setInterval(showNextSlide, 6000);
            }

            function resetAutoSlide() {
                clearInterval(autoSlideInterval);
                startAutoSlide();
            }

            startAutoSlide();

            // Keyboard Arrow navigation for the carousel when focused
            document.addEventListener('keydown', (e) => {
                const demoSec = document.getElementById('demo');
                const rect = demoSec.getBoundingClientRect();
                const isVisible = rect.top < window.innerHeight && rect.bottom >= 0;

                if (isVisible) {
                    if (e.key === 'ArrowRight') {
                        showNextSlide();
                        resetAutoSlide();
                    } else if (e.key === 'ArrowLeft') {
                        showPrevSlide();
                        resetAutoSlide();
                    }
                }
            });

            /* Touch/Swipe gesture support fully optimized for responsiveness */
            track.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
                clearInterval(autoSlideInterval);
            }, { passive: true });

            track.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentX = e.touches[0].clientX;
            }, { passive: true });

            track.addEventListener('touchend', () => {
                if (!isDragging) return;
                isDragging = false;
                const diffX = startX - currentX;
                if (Math.abs(diffX) > 40) { // Touch drag sensitivity threshold
                    if (diffX > 0) {
                        showNextSlide();
                    } else {
                        showPrevSlide();
                    }
                }
                startAutoSlide();
            }, { passive: true });

            /* 4. Lightbox View Component */
            const lightbox = document.getElementById('lightboxModal');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxClose = document.getElementById('lightboxClose');
            const openLightboxBtns = document.querySelectorAll('.open-lightbox');

            openLightboxBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const imgSrc = btn.getAttribute('data-img');
                    lightboxImg.src = imgSrc;
                    lightbox.classList.add('active');
                });
            });

            lightboxClose.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            function closeLightbox() {
                lightbox.classList.remove('active');
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }

            /* 5. Live Profit Calculator Logic with counting animations */
            const inputVisitors = document.getElementById('calcVisitors');
            const inputCTR = document.getElementById('calcCTR');
            const inputCPC = document.getElementById('calcCPC');

            const valVisitors = document.getElementById('valVisitors');
            const valCTR = document.getElementById('valCTR');
            const valCPC = document.getElementById('valCPC');
            const displayTotal = document.getElementById('calcTotalIncome');

            let currentAnimatedTotal = 0;

            function calculateEarnings() {
                const visitors = parseInt(inputVisitors.value, 10);
                const ctr = parseFloat(inputCTR.value);
                const cpc = parseFloat(inputCPC.value);

                // Income Formula: Visitors × CTR% × CPC × 30 days
                const estimatedIncome = visitors * (ctr / 100) * cpc * 30;

                // Update text display states
                valVisitors.innerText = visitors.toLocaleString('en-IN');
                valCTR.innerText = ctr.toFixed(1) + '%';
                valCPC.innerText = '₹' + cpc.toFixed(2);

                animateEarningsCounter(estimatedIncome);
            }

            function animateEarningsCounter(targetValue) {
                const start = currentAnimatedTotal;
                const end = targetValue;
                const duration = 500; // milliseconds
                let startTime = null;

                function animationStep(currentTime) {
                    if (!startTime) startTime = currentTime;
                    const progress = Math.min((currentTime - startTime) / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 3); // Cubic ease-out

                    const valueNow = Math.floor(start + (end - start) * easeProgress);
                    displayTotal.innerText = '₹' + valueNow.toLocaleString('en-IN');
                    currentAnimatedTotal = valueNow;

                    if (progress < 1) {
                        requestAnimationFrame(animationStep);
                    } else {
                        displayTotal.innerText = '₹' + Math.floor(end).toLocaleString('en-IN');
                        currentAnimatedTotal = end;
                    }
                }

                requestAnimationFrame(animationStep);
            }

            // Event Listeners for real-time calculations
            inputVisitors.addEventListener('input', calculateEarnings);
            inputCTR.addEventListener('input', calculateEarnings);
            inputCPC.addEventListener('input', calculateEarnings);

            // Trigger initial calculation state
            calculateEarnings();

            /* 6. Accessible Accordion Component */
            const faqHeaders = document.querySelectorAll('.faq-header');

            faqHeaders.forEach(header => {
                header.addEventListener('click', () => {
                    const item = header.parentElement;
                    const isActive = item.classList.contains('faq-item--active');
                    const content = item.querySelector('.faq-content');

                    // Close all other accordion drawers
                    document.querySelectorAll('.faq-item').forEach(otherItem => {
                        if (otherItem !== item) {
                            otherItem.classList.remove('faq-item--active');
                            otherItem.querySelector('.faq-content').style.maxHeight = null;
                            otherItem.querySelector('.faq-header').setAttribute('aria-expanded', 'false');
                        }
                    });

                    // Toggle active visual states
                    if (isActive) {
                        item.classList.remove('faq-item--active');
                        content.style.maxHeight = null;
                        header.setAttribute('aria-expanded', 'false');
                    } else {
                        item.classList.add('faq-item--active');
                        content.style.maxHeight = content.scrollHeight + 'px';
                        header.setAttribute('aria-expanded', 'true');
                    }
                });
            });

            /* 7. Back-to-Top Navigation Button Logic */
            const backToTopBtn = document.getElementById('backToTop');

            window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            }, { passive: true });

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        });
    </script>
