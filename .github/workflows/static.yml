            .testimonials-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }

            .footer-grid {
                grid-template-columns: 1.5fr repeat(3, 1fr);
                gap: 40px;
            }

            .rights-box {
                grid-template-columns: 1fr 1.2fr;
                padding: 40px;
                gap: 40px;
            }
        }
    </style>
</head>

